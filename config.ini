[crosshair]
type = cross          ; dot | cross | t | circle | diamond | arrow
size = 32             ; crosshair size in pixels
thickness = 1         ; line thickness
color = #00FFCC     ; hex color; #00FFCC (teal) works well on dark + light backgrounds
dot_center = true     ; show center dot
opacity = 0.9         ; 0.0 to 1.0
border = false        ; outline mode (circle only)
space_width = 6       ; gap between center and crosshair arms
primary_key = CTRL    ; CTRL | SHIFT | ALT | WIN (or combined like CTRL+SHIFT)
secondary_key = \     ; letter, number, F-key, or symbol (\, -, =, [, ], etc.)
rotation = 0.0        ; rotation in degrees
